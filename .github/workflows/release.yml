name: Package .crx

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-crx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode private key
        run: |
          base64 -d <<< "${{ secrets.CRX_PRIVATE_KEY }}" > key.pem

      - name: Pack .crx
        run: |
          python3 scripts/package-crx.py . key.pem novel-pinyin-restorer.crx

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}"             novel-pinyin-restorer.crx --clobber
