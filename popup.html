<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>小說拼音還原助手</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 360px;
        background-color: #09090b;
        color: #fafafa;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        box-sizing: border-box;
        user-select: none;
      }
      * {
        box-sizing: border-box;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        border-bottom: 1px solid #27272a;
        padding-bottom: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-logo {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-info {
        display: flex;
        flex-direction: column;
      }
      .brand-title {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .brand-subtitle {
        font-size: 11px;
        color: #71717a;
        margin: 0;
      }

      .switch-container {
        display: flex;
        align-items: center;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #27272a;
        transition:
          background-color 0.25s,
          border-color 0.25s;
        border-radius: 24px;
        border: 1px solid #3f3f46;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: #fafafa;
        transition: transform 0.25s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #10b981;
        border-color: #10b981;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }

      .card {
        background-color: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .card-title {
        font-size: 13px;
        font-weight: 500;
        color: #a1a1aa;
        margin: 0 0 12px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .badge {
        background-color: #27272a;
        color: #a1a1aa;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid #3f3f46;
      }

      .form-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }
      .input-wrapper {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .input-label {
        font-size: 11px;
        color: #71717a;
      }
      .input-field {
        background-color: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        color: #fafafa;
        padding: 8px 10px;
        font-size: 12.5px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
      }
      .input-field:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
      }
      .input-field.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
      }
      .btn-primary {
        background-color: #6366f1;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background-color 0.2s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
      }
      .btn-primary:hover {
        background-color: #4f46e5;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }

      .textarea-field {
        background-color: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        color: #fafafa;
        padding: 10px;
        font-size: 12.5px;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
        resize: vertical;
        min-height: 72px;
        box-sizing: border-box;
        line-height: 1.5;
      }
      .textarea-field:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
      }
      .textarea-field.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
      }
      .import-hint {
        font-size: 11px;
        color: #52525b;
        margin: 0 0 8px 0;
        line-height: 1.5;
      }
      .import-result {
        font-size: 11px;
        color: #10b981;
        margin: 6px 0 0 0;
        min-height: 16px;
        transition: opacity 0.3s;
      }
      .import-result.error {
        color: #ef4444;
      }

      .rules-list-container {
        position: relative;
      }
      .rules-list {
        max-height: 180px;
        overflow-y: auto;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .rule-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        background-color: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 12.5px;
        animation: fadeIn 0.2s ease-out;
      }
      .rule-item:last-child {
        margin-bottom: 0;
      }
      .rule-text {
        display: flex;
        align-items: center;
        gap: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex-grow: 1;
        margin-right: 8px;
      }
      .rule-key {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background-color: #18181b;
        padding: 2px 6px;
        border-radius: 4px;
        color: #e4e4e7;
        font-size: 11.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
      }
      .rule-arrow {
        color: #71717a;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .rule-replacement {
        color: #10b981;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
      }
      .btn-delete {
        background: none;
        border: none;
        color: #71717a;
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          color 0.2s,
          background-color 0.2s;
        flex-shrink: 0;
      }
      .btn-delete:hover {
        color: #ef4444;
        background-color: rgba(239, 68, 68, 0.1);
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 0;
        color: #71717a;
        text-align: center;
      }
      .empty-icon {
        margin-bottom: 8px;
        color: #3f3f46;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .empty-text {
        font-size: 13px;
        font-weight: 500;
        margin: 0;
      }
      .empty-subtext {
        font-size: 11px;
        color: #52525b;
        margin: 4px 0 0 0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .rules-list::-webkit-scrollbar {
        width: 6px;
      }
      .rules-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .rules-list::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 3px;
      }
      .rules-list::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="brand">
        <div class="brand-logo">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#10b981"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path
              d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
            ></path>
          </svg>
        </div>
        <div class="brand-info">
          <h1 class="brand-title">小說拼音還原助手</h1>
          <span class="brand-subtitle">Pinyin Restorer</span>
        </div>
      </div>
      <div class="switch-container">
        <label class="switch">
          <input type="checkbox" id="enableToggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <h2 class="card-title">新增還原規則</h2>
      <p class="import-hint">每行一組：拼音 空格 中文</p>
      <textarea
        id="batchInput"
        class="textarea-field"
        placeholder="zigong 子宮&#10;jingye 精液&#10;yindao 陰道&#10;rufang 乳房"
        rows="4"
      ></textarea>
      <button id="batchImportBtn" class="btn-primary" style="margin-top: 8px">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        匯入規則
      </button>
      <p id="importResult" class="import-result"></p>
    </div>
    <div class="card" style="margin-bottom: 0">
      <h2 class="card-title">
        自訂規則列表
        <span id="rulesCount" class="badge">0</span>
      </h2>
      <div class="rules-list-container">
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#3f3f46"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="9"></line>
              <line x1="9" y1="13" x2="15" y2="13"></line>
              <line x1="9" y1="17" x2="13" y2="17"></line>
            </svg>
          </div>
          <p class="empty-text">暫無自訂規則</p>
          <p class="empty-subtext">使用上方批次匯入加入還原規則</p>
        </div>
        <ul id="rulesList" class="rules-list" style="display: none"></ul>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
